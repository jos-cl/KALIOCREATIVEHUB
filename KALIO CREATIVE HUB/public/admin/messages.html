<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR STYLING */
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #b37676, #9d5f5f);
            color: white;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        .sidebar-title h2 {
            font-size: 18px;
            margin: 0;
        }

        .sidebar-menu ul {
            list-style: none;
            padding: 0;
        }

        .sidebar-menu li {
            margin-bottom: 10px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .sidebar-menu i {
            width: 20px;
            text-align: center;
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 30px;
            width: calc(100% - 250px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 18px;
            border: 2px solid #ecf0f1;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #b37676;
            color: white;
            border-color: #b37676;
        }

        .filter-btn:hover {
            border-color: #b37676;
            color: #b37676;
        }

        .filter-btn.active:hover {
            background: #9d5f5f;
        }

        .message-count {
            background: #ecf0f1;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            color: #2c3e50;
            font-weight: 600;
        }

        .messages-grid {
            display: grid;
            gap: 20px;
        }

        .message-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 5px solid #b37676;
        }

        .message-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border-left-color: #76b39d;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .message-from {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b37676, #76b39d);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .sender-info h3 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 18px;
        }

        .sender-info p {
            color: #7f8c8d;
            font-size: 13px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-new {
            background: #e8f8f5;
            color: #27ae60;
        }

        .status-responded {
            background: #fef9e7;
            color: #f39c12;
        }

        .status-inprogress {
            background: #ebf5fb;
            color: #3498db;
        }

        .message-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            line-height: 1.6;
            color: #555;
        }

        .message-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #ecf0f1;
            font-size: 12px;
            color: #95a5a6;
        }

        .contact-info {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .contact-info a {
            color: #b37676;
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .empty-state i {
            font-size: 60px;
            color: #bdc3c7;
            margin-bottom: 20px;
            display: block;
        }

        .empty-state p {
            font-size: 18px;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            border: 4px solid #ecf0f1;
            border-top: 4px solid #b37676;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-state p {
            color: #7f8c8d;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
                padding: 20px 15px;
            }

            .main-content {
                margin-left: 200px;
                width: calc(100% - 200px);
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="fas fa-palette"></i>
            </div>
            <div class="sidebar-title">
                <h2>Kalio Hub</h2>
            </div>
        </div>

        <div class="sidebar-menu">
            <ul>
                <li><a href="/admin"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
                <li><a href="#"><i class="fas fa-paint-brush"></i> <span>Projects</span></a></li>
                <li><a href="#"><i class="fas fa-users"></i> <span>Clients</span></a></li>
                <li><a href="/admin/messages" class="active"><i class="fas fa-envelope"></i> <span>Messages</span></a></li>
                <li><a href="#"><i class="fas fa-chart-line"></i> <span>Analytics</span></a></li>
                <li><a href="#"><i class="fas fa-cogs"></i> <span>Settings</span></a></li>
                <li><a href="#"><i class="fas fa-image"></i> <span>Portfolio</span></a></li>
                <li><a href="#"><i class="fas fa-file-alt"></i> <span>Content</span></a></li>
            </ul>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="header">
            <h1>
                <i class="fas fa-envelope"></i>
                All Messages
            </h1>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" onclick="filterMessages('all')">
                All Messages <span class="message-count" id="count-all">0</span>
            </button>
            <button class="filter-btn" onclick="filterMessages('inquiry')">
                Inquiries <span class="message-count" id="count-inquiry">0</span>
            </button>
            <button class="filter-btn" onclick="filterMessages('service_request')">
                Service Requests <span class="message-count" id="count-service">0</span>
            </button>
            <button class="filter-btn" onclick="filterMessages('new')">
                New <span class="message-count" id="count-new">0</span>
            </button>
            <button class="filter-btn" onclick="filterMessages('responded')">
                Responded <span class="message-count" id="count-responded">0</span>
            </button>
        </div>

        <div class="messages-grid" id="messagesContainer">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading messages...</p>
            </div>
        </div>
    </div>

    <script>
        let allMessages = [];
        let currentFilter = 'all';

        function loadAllMessages() {
            fetch('/api/inquiries')
                .then(res => {
                    if (!res.ok) throw new Error('Failed to fetch');
                    return res.json();
                })
                .then(data => {
                    allMessages = data || [];
                    updateCounts();
                    renderMessages();
                })
                .catch(err => {
                    console.error('Error loading messages:', err);
                    document.getElementById('messagesContainer').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-circle"></i>
                            <p>Error loading messages. Please try again.</p>
                        </div>
                    `;
                });
        }

        function updateCounts() {
            const allCount = allMessages.length;
            const inquiriesCount = allMessages.filter(m => m.type === 'inquiry').length;
            const serviceCount = allMessages.filter(m => m.type === 'service_request').length;
            const newCount = allMessages.filter(m => m.status === 'new').length;
            const respondedCount = allMessages.filter(m => m.status === 'responded').length;

            document.getElementById('count-all').textContent = allCount;
            document.getElementById('count-inquiry').textContent = inquiriesCount;
            document.getElementById('count-service').textContent = serviceCount;
            document.getElementById('count-new').textContent = newCount;
            document.getElementById('count-responded').textContent = respondedCount;
        }

        function filterMessages(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.filter-btn').classList.add('active');

            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            
            let filtered = allMessages;
            if (currentFilter === 'all') {
                filtered = allMessages;
            } else if (currentFilter === 'inquiry') {
                filtered = allMessages.filter(m => m.type === 'inquiry');
            } else if (currentFilter === 'service_request') {
                filtered = allMessages.filter(m => m.type === 'service_request');
            } else if (currentFilter === 'new') {
                filtered = allMessages.filter(m => m.status === 'new');
            } else if (currentFilter === 'responded') {
                filtered = allMessages.filter(m => m.status === 'responded');
            }

            if (!filtered || filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No messages found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(msg => `
                <div class="message-card" onclick="viewMessage('${msg.id}')">
                    <div class="message-header">
                        <div class="message-from">
                            <div class="avatar">${getInitials(msg.name)}</div>
                            <div class="sender-info">
                                <h3>${msg.name || 'Unknown'}</h3>
                                <p>${msg.type === 'inquiry' ? 'Inquiry' : 'Service Request'} • ${formatDate(msg.created_at)}</p>
                            </div>
                        </div>
                        <span class="status-badge status-${msg.status || 'new'}">
                            ${msg.status || 'new'}
                        </span>
                    </div>
                    <div class="message-content">
                        <strong>${msg.subject || 'No Subject'}</strong>
                        <p style="margin-top: 8px;">${msg.message ? msg.message.substring(0, 150) + (msg.message.length > 150 ? '...' : '') : 'No message'}</p>
                    </div>
                    <div class="message-footer">
                        <div class="contact-info">
                            ${msg.email ? `<a href="mailto:${msg.email}"><i class="fas fa-envelope"></i> ${msg.email}</a>` : ''}
                            ${msg.phone ? `<a href="tel:${msg.phone}"><i class="fas fa-phone"></i> ${msg.phone}</a>` : ''}
                        </div>
                        ${msg.responses && msg.responses.length > 0 ? `
                            <span><i class="fas fa-reply"></i> ${msg.responses.length} response${msg.responses.length !== 1 ? 's' : ''}</span>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function getInitials(name) {
            if (!name) return '?';
            return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'unknown';
            try {
                const date = new Date(dateStr);
                const now = new Date();
                const diff = now - date;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                
                if (days === 0) {
                    const hours = Math.floor(diff / (1000 * 60 * 60));
                    if (hours === 0) {
                        const mins = Math.floor(diff / (1000 * 60));
                        return mins === 0 ? 'just now' : `${mins}m ago`;
                    }
                    return `${hours}h ago`;
                }
                if (days === 1) return 'yesterday';
                if (days < 7) return `${days}d ago`;
                
                return date.toLocaleDateString();
            } catch (e) {
                return dateStr;
            }
        }

        function viewMessage(messageId) {
            alert('Click a message to view details. This feature requires admin dashboard integration.');
        }

        // Load messages on page load
        window.addEventListener('load', () => {
            loadAllMessages();
            // Auto-refresh every 10 seconds
            setInterval(loadAllMessages, 10000);
        });
    </script>
</body>
</html>
